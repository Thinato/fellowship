name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross_linker: aarch64-linux-gnu-gcc
            apt_packages: gcc-aarch64-linux-gnu
          - target: aarch64-apple-darwin
            os: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross compiler
        if: matrix.apt_packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Configure cross linker
        if: matrix.cross_linker
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.${{ matrix.target }}]
          linker = "${{ matrix.cross_linker }}"
          EOF

      - name: Build release binaries
        # All three binaries must ship together: fellowship's guard layer
        # boots by locating `safe-git` next to itself and PTYs invoke
        # `fellowship-ctl` for heartbeats / spawn-requests / journal writes.
        run: cargo build --release --locked --target ${{ matrix.target }} --bins

      - name: Package tarball
        id: pkg
        run: |
          version="${GITHUB_REF_NAME}"
          name="fellowship-${version}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/fellowship" "dist/${name}/"
          cp "target/${{ matrix.target }}/release/fellowship-ctl" "dist/${name}/"
          cp "target/${{ matrix.target }}/release/safe-git" "dist/${name}/"
          cp README.md "dist/${name}/"
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          echo "artifact=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pkg.outputs.artifact }}
          fail_on_unmatched_files: true
